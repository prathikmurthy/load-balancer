services:
  backend1:
    build: .
    command: ./backend -port 9001
    expose:
      - "9001"

  backend2:
    build: .
    command: ./backend -port 9002
    expose:
      - "9002"

  backend3:
    build: .
    command: ./backend -port 9003
    expose:
      - "9003"

  lb:
    build: .
    command: ./lb http://backend1:9001 http://backend2:9002 http://backend3:9003
    ports:
      - "8080:8080"
    depends_on:
      - backend1
      - backend2
      - backend3

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - lb

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
